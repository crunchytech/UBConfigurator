<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lane Group Excel Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-muted: #f8faff;
      --text: #18212f;
      --text-muted: #5d6a7d;
      --primary: #2e6cff;
      --primary-hover: #1f5ef4;
      --primary-soft: #e9f0ff;
      --border: #d9e1ef;
      --danger: #d6415d;
      --danger-hover: #bd2f4b;
      --shadow: 0 24px 48px -34px rgba(22, 36, 64, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(145deg, #eff3ff 0%, var(--bg) 40%, #eef6ff 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .app-shell {
      max-width: 980px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #fcfdff 0%, #f7faff 100%);
    }

    h1 {
      margin: 0;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0.35rem 0 0;
      font-size: 0.92rem;
      color: var(--text-muted);
    }

    .content {
      padding: 1.5rem 2rem 2rem;
      display: grid;
      gap: 1.25rem;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      padding: 1rem;
      display: grid;
      gap: 0.9rem;
    }

    .panel-muted {
      background: var(--surface-muted);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.9rem;
    }

    label {
      display: grid;
      gap: 0.45rem;
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    input[type="text"],
    select,
    input[type="file"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 0.6rem 0.75rem;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="text"]:focus,
    select:focus,
    input[type="file"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(46, 108, 255, 0.16);
    }

    .action-row,
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: center;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 0.62rem 0.95rem;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.15s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:active {
      transform: translateY(1px);
    }

    .lane-numbers {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.6rem;
    }

    .lane-group-block {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 0.6rem;
      display: grid;
      gap: 0.5rem;
    }

    .lane-group-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      margin: 0;
    }

    .lane-entry {
      border: 1px solid var(--border);
      border-radius: 11px;
      background: #fff;
      padding: 0.7rem 0.8rem;
      margin-bottom: 0.55rem;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: center;
    }

    .lane-entry button {
      background: var(--danger);
      padding: 0.45rem 0.75rem;
      font-size: 0.8rem;
    }

    .lane-entry button:hover {
      background: var(--danger-hover);
    }

    .group-container {
      margin-top: 0.2rem;
    }

    .preview {
      font-size: 0.88rem;
      color: var(--text-muted);
      background: var(--primary-soft);
      border: 1px solid #d7e4ff;
      border-radius: 10px;
      padding: 0.7rem 0.85rem;
    }

    .reference-note {
      font-size: 0.8rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 0.9rem;
      margin-top: 0.2rem;
    }

    .checkbox-label {
      display: inline-flex;
      gap: 0.5rem;
      align-items: center;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <h1>Lane Group Excel Generator</h1>
      <p class="subtitle">Create tracking groups and export professional IP and server configuration files.</p>
    </div>
    <div class="content">
      <div class="panel panel-muted">
        <div class="field-grid">
          <label>Project Code
            <input id="project-code" placeholder="Enter project code">
          </label>
          <label>Gateway IP
            <input id="gateway-ip" placeholder="Enter gateway IP">
          </label>
          <label>DNS
            <input id="dns-ip" placeholder="Enter DNS">
          </label>
          <label>Starting IP Address
            <input id="start-ip" type="text" value="192.168.0.10" oninput="updatePreview()">
          </label>
          <label>Subnet Mask
            <input id="subnet-mask" type="text" value="255.255.255.0">
          </label>
        </div>
      </div>

      <div class="panel">
        <div class="field-grid">
          <label>Configuration
            <select id="lane-type" onchange="updateLaneInputs()">
              <option value="" disabled selected>Select configuration</option>
              <option value="3P/2L">3P/2L</option>
              <option value="6P/4L">6P/4L</option>
              <option value="4P/2L">4P/2L</option>
              <option value="4P/4L">4P/4L</option>
              <option value="3P/2L-EU">3P/2L-EU</option>
              <option value="6P/4L-EU">6P/4L-EU</option>
              <option value="4P/2L-EU">4P/2L-EU</option>
              <option value="4P/4L-EU">4P/4L-EU</option>
            </select>
          </label>
          <label>Lane Group ID
            <input id="tracking-name" type="text" placeholder="e.g., A">
          </label>
          <label id="tracking-name-2-wrapper" style="display:none;">Lane Group ID 2
            <input id="tracking-name-2" type="text" placeholder="e.g., B">
          </label>
        </div>

        <div id="lane-numbers" class="lane-numbers"></div>

        <div class="action-row">
          <label class="checkbox-label"><input type="checkbox" id="support-option"> Support Option</label>
          <button onclick="addTrackingGroup()">Add Tracking Group</button>
          <button onclick="saveTemplate()">Save Template</button>
          <input type="file" id="load-template" onchange="loadTemplate(event)">
        </div>
      </div>

      <div class="panel">
        <div id="lane-list" class="group-container"></div>
        <div class="preview" id="ip-preview"></div>
        <div class="button-row">
          <button onclick="generateExcel()">Generate IP Sheet</button>
          <button onclick="generateCSV()">Generate Server Config File</button>
        </div>
        <div class="reference-note">
          Labeling reference: Design Document <strong id="design-reference">UB Labeling v0.1</strong> and Engineering Document <strong id="engineering-reference">Device Matrix R0_20250624</strong>.
        </div>
      </div>
    </div>
  </div>

  <script>
    let trackingGroups = [];
    let licenseKey = "LICENSEKEY";

    const configs = {
      "3P/2L": { pc: 1, proj: 3, lidar: 1, camera: 1, pduType: 'Wattbox', lanes: 2 },
      "6P/4L": { pc: 2, proj: 6, lidar: 1, camera: 1, pduType: 'Wattbox', lanes: 4 },
      "4P/2L": { pc: 1, proj: 4, lidar: 1, camera: 1, pduType: 'Wattbox', lanes: 2 },
      "4P/4L": { pc: 1, proj: 4, lidar: 1, camera: 1, pduType: 'Wattbox', lanes: 4 },
      "3P/2L-EU": { pc: 1, proj: 3, lidar: 1, camera: 1, pduType: 'Aviosys', lanes: 2 },
      "6P/4L-EU": { pc: 2, proj: 6, lidar: 1, camera: 1, pduType: 'Aviosys', lanes: 4 },
      "4P/2L-EU": { pc: 1, proj: 4, lidar: 1, camera: 1, pduType: 'Aviosys', lanes: 2 },
      "4P/4L-EU": { pc: 1, proj: 4, lidar: 1, camera: 1, pduType: 'Aviosys', lanes: 4 }
    };

    const supportPDUs = {
      "3P/2L": 3,
      "6P/4L": 5,
      "4P/2L": 4,
      "4P/4L": 4,
      "3P/2L-EU": 3,
      "6P/4L-EU": 5,
      "4P/2L-EU": 3,
      "4P/4L-EU": 3
    };

    const supportPDUByDevice = {
      "3P/2L": { pc: 1, lidar: 1, projectors: 1 },
      "6P/4L": { pc: 2, lidar: 1, projectors: 2 },
      "4P/2L": { pc: 1, lidar: 1, projectors: 2 },
      "4P/4L": { pc: 1, lidar: 1, projectors: 2 },
      "3P/2L-EU": { pc: 1, lidar: 1, projectors: 1 },
      "6P/4L-EU": { pc: 2, lidar: 1, projectors: 2 },
      "4P/2L-EU": { pc: 1, lidar: 1, projectors: 1 },
      "4P/4L-EU": { pc: 1, lidar: 1, projectors: 1 }
    };

    function isDualTrackingType(type) {
      return type === "6P/4L" || type === "6P/4L-EU";
    }

    function parseLaneGroupIds(groupName, fallbackBase = 'A') {
      const ids = String(groupName || '')
        .split(',')
        .map(id => id.trim())
        .filter(id => id);
      if (ids.length >= 2) return ids.slice(0, 2);
      const base = ids[0] || fallbackBase;
      return [`${base}1`, `${base}2`];
    }

    function getLaneGroups(group, index = 0) {
      const fallbackBase = `${group.type || 'LaneGroup'}-${index + 1}`;
      if (Array.isArray(group.laneGroups) && group.laneGroups.length > 0) {
        return group.laneGroups.map((laneGroup, laneGroupIndex) => ({
          id: (laneGroup.id || `${fallbackBase}-${laneGroupIndex + 1}`).toString().trim(),
          laneNumbers: Array.isArray(laneGroup.laneNumbers)
            ? laneGroup.laneNumbers.map(l => String(l).trim()).filter(Boolean)
            : []
        }));
      }

      const laneNumbers = Array.isArray(group.laneNumbers)
        ? group.laneNumbers.map(l => String(l).trim()).filter(Boolean)
        : [];

      if (isDualTrackingType(group.type)) {
        const ids = parseLaneGroupIds(group.name, fallbackBase);
        return ids.map((id, laneGroupIndex) => ({
          id,
          laneNumbers: laneNumbers.slice(laneGroupIndex * 2, laneGroupIndex * 2 + 2)
        }));
      }

      const laneGroupId = String(group.name || fallbackBase).trim() || fallbackBase;
      return [{ id: laneGroupId, laneNumbers }];
    }

    function normalizeTrackingGroup(group, index = 0) {
      const laneGroups = getLaneGroups(group, index);
      const laneNumbers = laneGroups.flatMap(laneGroup => laneGroup.laneNumbers);
      const name = laneGroups.length > 1
        ? laneGroups.map(laneGroup => laneGroup.id).join(',')
        : (laneGroups[0]?.id || `${group.type}-${index + 1}`);
      return { ...group, name, laneGroups, laneNumbers };
    }

    function updateLaneInputs() {
      const container = document.getElementById('lane-numbers');
      container.innerHTML = '';
      const type = document.getElementById('lane-type').value;
      if (!type || !configs[type]) return;
      const lanes = configs[type].lanes;
      const secondTrackingWrapper = document.getElementById('tracking-name-2-wrapper');
      const isDualTracking = isDualTrackingType(type);
      secondTrackingWrapper.style.display = isDualTracking ? 'inline-block' : 'none';
      if (isDualTracking) {
        for (let laneGroupIndex = 0; laneGroupIndex < 2; laneGroupIndex++) {
          const laneGroupBlock = document.createElement('div');
          laneGroupBlock.className = 'lane-group-block';

          const laneGroupTitle = document.createElement('p');
          laneGroupTitle.className = 'lane-group-title';
          laneGroupTitle.textContent = `Lane Group ${laneGroupIndex + 1} Lanes`;
          laneGroupBlock.appendChild(laneGroupTitle);

          for (let laneIndex = 0; laneIndex < 2; laneIndex++) {
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = `Lane ${laneIndex + 1} Number`;
            input.className = 'lane-input';
            input.dataset.laneGroupIndex = String(laneGroupIndex);
            laneGroupBlock.appendChild(input);
          }
          container.appendChild(laneGroupBlock);
        }
        return;
      }

      for (let i = 0; i < lanes; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `Lane ${i + 1} Number`;
        input.className = 'lane-input';
        input.dataset.laneGroupIndex = '0';
        container.appendChild(input);
      }
    }

    function addTrackingGroup() {
      const type = document.getElementById('lane-type').value;
      const customName = document.getElementById('tracking-name').value.trim();
      const customName2 = document.getElementById('tracking-name-2').value.trim();
      const laneInputs = document.querySelectorAll('.lane-input');
      const support = document.getElementById('support-option').checked;

      const pdu = support ? supportPDUs[type] || 0 : 0;
      const isDualTracking = isDualTrackingType(type);
      const fallbackName = `${type}-${trackingGroups.length + 1}`;
      const laneGroups = isDualTracking
        ? [
            { id: customName || `${fallbackName}A`, laneNumbers: [] },
            { id: customName2 || `${fallbackName}B`, laneNumbers: [] }
          ]
        : [{ id: customName || fallbackName, laneNumbers: [] }];

      Array.from(laneInputs).forEach(input => {
        const laneNumber = input.value.trim();
        if (!laneNumber) return;
        const laneGroupIndexRaw = input.dataset.laneGroupIndex;
        if (laneGroupIndexRaw === undefined || laneGroupIndexRaw === '') return;
        const laneGroupIndex = Number(laneGroupIndexRaw);
        if (!Number.isInteger(laneGroupIndex) || laneGroupIndex < 0 || laneGroupIndex >= laneGroups.length) return;
        const laneGroup = laneGroups[laneGroupIndex];
        laneGroup.laneNumbers.push(laneNumber);
      });

      const laneNumbers = laneGroups.flatMap(laneGroup => laneGroup.laneNumbers);
      const groupName = laneGroups.length > 1
        ? laneGroups.map(laneGroup => laneGroup.id).join(',')
        : laneGroups[0].id;

      trackingGroups.push({ type, name: groupName, laneGroups, laneNumbers, support, pdu });
      renderTrackingGroups();
      updatePreview();
    }

    function removeTrackingGroup(index) {
      trackingGroups.splice(index, 1);
      renderTrackingGroups();
      updatePreview();
    }

    function renderTrackingGroups() {
      const groupList = document.getElementById('lane-list');
      groupList.innerHTML = '';
      trackingGroups.forEach((group, index) => {
        const normalizedGroup = normalizeTrackingGroup(group, index);
        const laneGroupsText = normalizedGroup.laneGroups
          .map(laneGroup => `${laneGroup.id} [${laneGroup.laneNumbers.join(', ')}]`)
          .join(' | ');
        const supportText = group.support ? "with Support" : "no Support";
        const div = document.createElement('div');
        div.className = 'lane-entry';
        div.innerHTML = `Tracking Group ${index + 1}: <strong>${normalizedGroup.type}</strong> | Lane Group IDs: ${laneGroupsText} | ${supportText} <button onclick="removeTrackingGroup(${index})">Remove</button>`;
        groupList.appendChild(div);
      });
    }

    function ipIncrement(ip, inc) {
      const parts = ip.split('.').map(Number);
      let i = parts[3] + inc;
      parts[3] = i % 256;
      parts[2] += Math.floor(i / 256);
      return parts.join('.');
    }

    function updatePreview() {
      let ip = document.getElementById('start-ip').value;
      let count = 1;
      trackingGroups.forEach(g => {
        const cfg = configs[g.type];
        count += cfg.pc + cfg.proj + cfg.lidar + cfg.camera + g.pdu;
      });
      let lastIP = ip;
      for (let i = 1; i < count; i++) lastIP = ipIncrement(lastIP, 1);
      document.getElementById('ip-preview').textContent = `Preview IP Range: ${ip} - ${lastIP}`;
    }

    function getSupportPDUCounts(type) {
      return supportPDUByDevice[type] || { pc: 0, lidar: 0, projectors: 0 };
    }

    function getLabelingReferences() {
      const designReference = document.getElementById('design-reference')?.textContent?.trim() ?? '';
      const engineeringReference = document.getElementById('engineering-reference')?.textContent?.trim() ?? '';
      return { designReference, engineeringReference };
    }

    function generateCSV() {
      let ip = document.getElementById('start-ip').value;
      const rows = [];
      rows.push(["CONFIG VERSION", "3"]);
      rows.push(["UNREAL LICENSE", "replace-me-with-the-license"]);

      trackingGroups.forEach((group) => {
        const cfg = configs[group.type];

        for (let i = 0; i < cfg.pc; i++) {
          rows.push(["COMPUTER IP", ip]);
          ip = ipIncrement(ip, 1);
        }

        group.laneNumbers.forEach(lane => {
          rows.push(["LANE NUMBER", lane]);
        });

        const firstLane = group.laneNumbers[0];
        const lastLane = group.laneNumbers[group.laneNumbers.length - 1];

        for (let i = 0; i < cfg.proj; i++) {
          const label = `Lane ${firstLane}-${lastLane} ${String.fromCharCode(65 + i)}`;
          rows.push(["PROJECTOR IP", ip]);
          ip = ipIncrement(ip, 1);
          rows.push(["PROJECTOR LABEL", label]);
          rows.push(["PROJECTOR MODEL", "OPTOMA"]);
        }

        ip = ipIncrement(ip, cfg.lidar + cfg.camera + group.pdu);
      });


      const csvContent = rows.map(row => row.join(",")).join("\n");
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      saveAs(blob, 'LaneGroups-Config.csv');
    }

        function generateExcel() {
  const workbook = new ExcelJS.Workbook();
  const sheet = workbook.addWorksheet("IP Sheet");

  const projectCode = document.getElementById('project-code').value;
  const gateway = document.getElementById('gateway-ip').value;
  const dns = document.getElementById('dns-ip').value;
  const subnetmask = document.getElementById('subnet-mask').value;
  sheet.addRow([]);

  sheet.columns = [
    { header: "Device", key: "device", width: 20 },
    { header: "IP Address", key: "ip", width: 20 },
    { header: "MAC Address", key: "mac", width: 20 },
    { header: "Serial Number", key: "serial", width: 20 },
    { header: "Credentials", key: "userpw", width: 20 },
    { header: "Project Code", key: "projcode", width: 20 },
    { header: "Gateway IP", key: "gtwip", width: 20 },
    { header: "DNS", key: "dnsip", width: 20 },
    { header: "Subnet Mask", key: "subnet", width: 20 }
  ];

  sheet.addRow(
    dns
      ? { projcode: projectCode, gtwip: gateway, dnsip: dns , subnet: subnetmask }
      : { projcode: projectCode, gtwip: gateway , subnet: subnetmask}
  );

  const { designReference, engineeringReference } = getLabelingReferences();
  const REFERENCE_COLUMN_START = sheet.columnCount + 2;
  sheet.getColumn(REFERENCE_COLUMN_START).width = 24;
  sheet.getColumn(REFERENCE_COLUMN_START + 1).width = 34;
  sheet.getCell(2, REFERENCE_COLUMN_START).value = "Design Document";
  sheet.getCell(2, REFERENCE_COLUMN_START).font = { bold: true };
  sheet.getCell(2, REFERENCE_COLUMN_START + 1).value = designReference;
  sheet.getCell(3, REFERENCE_COLUMN_START).value = "Engineering Document";
  sheet.getCell(3, REFERENCE_COLUMN_START).font = { bold: true };
  sheet.getCell(3, REFERENCE_COLUMN_START + 1).value = engineeringReference;

  let ip = document.getElementById('start-ip').value;
  const altFill = {
    type: 'pattern',
    pattern: 'solid',
    fgColor: { argb: 'FFEFEFEF' }
  };

  trackingGroups.forEach((group, index) => {
    const cfg = configs[group.type];
    sheet.addRow([]);
    const normalizedGroup = normalizeTrackingGroup(group, index);
    const headerName = normalizedGroup.laneGroups.map(laneGroup => laneGroup.id).join('/');
    const headerRow = sheet.addRow([`Tracking Group ${index + 1}: ${headerName} (${normalizedGroup.type})`]);
    headerRow.eachCell(cell => {
      cell.font = { bold: true };
    });

    let rowCount = 0;

    if (normalizedGroup.type === "6P/4L" || normalizedGroup.type === "6P/4L-EU") {
      const laneGroupIds = getLaneGroups(normalizedGroup, index).slice(0, 2).map(laneGroup => laneGroup.id);
      const pduCounts = (normalizedGroup.support || normalizedGroup.pdu > 0) ? getSupportPDUCounts(normalizedGroup.type) : { pc: 0, lidar: 0, projectors: 0 };

      laneGroupIds.forEach((laneGroupId, idIndex) => {
        const pcLabel = `PC-${laneGroupId}`;
        const pcRow = sheet.addRow({ device: pcLabel, ip });
        if (rowCount++ % 2 === 0) pcRow.eachCell(cell => cell.fill = altFill);
        ip = ipIncrement(ip, 1);

        for (let i = 0; i < 3; i++) {
          const label = `PROJ-${laneGroupId}${i + 1}`;
          const row = sheet.addRow({ device: label, ip });
          if (rowCount++ % 2 === 0) row.eachCell(cell => cell.fill = altFill);
          ip = ipIncrement(ip, 1);
        }

        const pcPduCount = Math.floor(pduCounts.pc / laneGroupIds.length) + (idIndex < (pduCounts.pc % laneGroupIds.length) ? 1 : 0);
        for (let i = 0; i < pcPduCount; i++) {
          const label = pcPduCount > 1 ? `PDU-PC${i + 1}-${laneGroupId}` : `PDU-PC-${laneGroupId}`;
          const row = sheet.addRow({ device: label, ip });
          if (rowCount++ % 2 === 0) row.eachCell(cell => cell.fill = altFill);
          ip = ipIncrement(ip, 1);
        }

        const projectorPduCount = Math.floor(pduCounts.projectors / laneGroupIds.length) + (idIndex < (pduCounts.projectors % laneGroupIds.length) ? 1 : 0);
        for (let i = 0; i < projectorPduCount; i++) {
          const label = projectorPduCount > 1 ? `PDU-PROJ${i + 1}-${laneGroupId}` : `PDU-PROJ-${laneGroupId}`;
          const row = sheet.addRow({ device: label, ip });
          if (rowCount++ % 2 === 0) row.eachCell(cell => cell.fill = altFill);
          ip = ipIncrement(ip, 1);
        }
      });

      const sharedTrackingLabel = laneGroupIds.join('/');
      const lidarRow = sheet.addRow({ device: `LiDAR-${sharedTrackingLabel}`, ip });
      if (rowCount++ % 2 === 0) lidarRow.eachCell(cell => cell.fill = altFill);
      ip = ipIncrement(ip, 1);

      const camRow = sheet.addRow({ device: `Camera-${sharedTrackingLabel}`, ip });
      if (rowCount++ % 2 === 0) camRow.eachCell(cell => cell.fill = altFill);
      ip = ipIncrement(ip, 1);

      for (let i = 0; i < pduCounts.lidar; i++) {
        const label = pduCounts.lidar > 1 ? `PDU-LiDAR${i + 1}-${sharedTrackingLabel}` : `PDU-LiDAR-${sharedTrackingLabel}`;
        const row = sheet.addRow({ device: label, ip });
        if (rowCount++ % 2 === 0) row.eachCell(cell => cell.fill = altFill);
        ip = ipIncrement(ip, 1);
      }

    } else {
      // All other configs: lane group = tracking group
      const pduCounts = (normalizedGroup.support || normalizedGroup.pdu > 0) ? getSupportPDUCounts(normalizedGroup.type) : { pc: 0, lidar: 0, projectors: 0 };

      for (let i = 0; i < cfg.pc; i++) {
        const label = `PC-${headerName}`;
        const row = sheet.addRow({ device: label, ip });
        if (rowCount++ % 2 === 0) row.eachCell(cell => cell.fill = altFill);
        ip = ipIncrement(ip, 1);
      }
      for (let i = 0; i < cfg.proj; i++) {
        const label = `PROJ${i + 1}-${headerName}`;
        const row = sheet.addRow({ device: label, ip });
        if (rowCount++ % 2 === 0) row.eachCell(cell => cell.fill = altFill);
        ip = ipIncrement(ip, 1);
      }
      const lidarRow = sheet.addRow({ device: `LiDAR-${headerName}`, ip });
      if (rowCount++ % 2 === 0) lidarRow.eachCell(cell => cell.fill = altFill);
      ip = ipIncrement(ip, 1);

      const camRow = sheet.addRow({ device: `Camera-${headerName}`, ip });
      if (rowCount++ % 2 === 0) camRow.eachCell(cell => cell.fill = altFill);
      ip = ipIncrement(ip, 1);

      for (let i = 0; i < pduCounts.pc; i++) {
        const label = pduCounts.pc > 1 ? `PDU-PC${i + 1}-${headerName}` : `PDU-PC-${headerName}`;
        const row = sheet.addRow({ device: label, ip });
        if (rowCount++ % 2 === 0) row.eachCell(cell => cell.fill = altFill);
        ip = ipIncrement(ip, 1);
      }

      for (let i = 0; i < pduCounts.projectors; i++) {
        const label = pduCounts.projectors > 1 ? `PDU-PROJ${i + 1}-${headerName}` : `PDU-PROJ-${headerName}`;
        const row = sheet.addRow({ device: label, ip });
        if (rowCount++ % 2 === 0) row.eachCell(cell => cell.fill = altFill);
        ip = ipIncrement(ip, 1);
      }

      for (let i = 0; i < pduCounts.lidar; i++) {
        const label = pduCounts.lidar > 1 ? `PDU-LiDAR${i + 1}-${headerName}` : `PDU-LiDAR-${headerName}`;
        const row = sheet.addRow({ device: label, ip });
        if (rowCount++ % 2 === 0) row.eachCell(cell => cell.fill = altFill);
        ip = ipIncrement(ip, 1);
      }
    }
  });

  sheet.addRow([]);
  const serverRow = sheet.addRow(["Server", ip]);
  serverRow.eachCell(cell => cell.font = { bold: true });
  ip = ipIncrement(ip, 1);

  const serverPDU = sheet.addRow({ device: "Server PDU", ip });
  serverPDU.eachCell(cell => cell.fill = altFill);

  workbook.xlsx.writeBuffer().then(buffer => {
    saveAs(new Blob([buffer]), 'LaneGroups-IPSheet.xlsx');
  });
    }

    function saveTemplate() {
      const projectCode = document.getElementById('project-code').value.trim() || 'lane';
      const filename = `${projectCode}-template.json`;
      const blob = new Blob([JSON.stringify(trackingGroups, null, 2)], { type: 'application/json' });
      saveAs(blob, filename);
    }

    function loadTemplate(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const loadedGroups = JSON.parse(e.target.result);
          trackingGroups = Array.isArray(loadedGroups)
            ? loadedGroups.map((group, index) => normalizeTrackingGroup(group, index))
            : [];
          renderTrackingGroups();
          updatePreview();
        } catch (err) {
          alert('Failed to load template: Invalid format');
        }
      };
      reader.readAsText(file);
    }
  </script>
</body>
</html>
